<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACMI Ops Center — Mad EZ Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ═══ madezmedia v3 design tokens — editorial-tech ═══ */
    :root {
      --paper:        #faf9f5;
      --paper-warm:   #f4f2eb;
      --paper-shadow: #ebe8de;
      --ink:          #1a1a1a;
      --ink-soft:     #2c2c2a;
      --ink-mute:     #4a4a48;
      --ink-fade:     #7a7a76;
      --ink-quiet:    #9a9a96;
      --ink-rule:     #d4d2cc;
      --accent:       #2d4a3e;
      --accent-soft:  #5a7d6f;
      --accent-quiet: #1c3027;
      --quote-rule:   #b8b0a0;
      --quote-deep:   #5c5648;
      --underline:    #1a1a1a;
      --underline-em: #2d4a3e;
      --font-serif:   'Source Serif 4', Georgia, serif;
      --font-sans:    'Inter', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'SF Mono', Consolas, monospace;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 14px rgba(0,0,0,0.07);
      /* Framework colors */
      --fw-langgraph: #c4572a;
      --fw-crewai:    #c9a227;
      --fw-agno:      #6b7a3d;
      --fw-autogen:   #8b6e5a;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { font-size:16px; }
    body { font-family:var(--font-sans); background:var(--paper); color:var(--ink); line-height:1.45; -webkit-font-smoothing:antialiased; }

    /* ═══ UTILITIES ═══ */
    .mono { font-family:var(--font-mono); }
    .serif { font-family:var(--font-serif); }
    .meta { font-size:0.7rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-fade); }
    .row { display:flex; align-items:center; }
    .gap-2 { gap:0.5rem; }
    .gap-3 { gap:0.75rem; }
    .rule { border:none; border-top:1px solid var(--ink-rule); margin:0; }
    .rule.dotted { border-style:dashed; }
    .btn { font-family:var(--font-sans); font-size:0.8rem; font-weight:500; border:1px solid var(--ink-rule); border-radius:var(--radius); background:transparent; color:var(--ink); cursor:pointer; padding:6px 12px; transition:all 0.15s; }
    .btn:hover { border-color:var(--ink-mute); }
    .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn.primary:hover { background:var(--accent-soft); }
    .btn.ghost { border-color:transparent; }
    .btn.ghost:hover { background:var(--paper-warm); }

    /* ═══ TOP BAR ═══ */
    .topbar {
      position:sticky; top:0; z-index:100;
      background:rgba(250,249,245,0.88); backdrop-filter:blur(14px);
      border-bottom:1px solid var(--ink-rule);
      padding:0 1.5rem; height:48px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .topbar-left { display:flex; align-items:center; gap:0.75rem; }
    .topbar-logo { font-family:var(--font-serif); font-weight:600; font-size:1.1rem; color:var(--accent); }
    .topbar-logo span { color:var(--ink); }
    .topbar-badge { font-size:0.6rem; font-weight:700; padding:0.12rem 0.45rem; border-radius:3px; background:var(--accent); color:#fff; text-transform:uppercase; letter-spacing:0.5px; }
    .topbar-right { display:flex; align-items:center; gap:1rem; font-size:0.75rem; color:var(--ink-fade); }
    .live-dot { width:7px; height:7px; border-radius:50%; background:#22c55e; display:inline-block; animation:pulse 2s infinite; }
    .live-dot.err { background:#ef4444; animation:none; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .refresh-info { font-family:var(--font-mono); font-size:0.7rem; color:var(--ink-quiet); }

    /* ═══ LAYOUT ═══ */
    .layout { display:grid; grid-template-columns:260px 1fr 320px; height:calc(100vh - 48px); overflow:hidden; }
    @media(max-width:1100px) { .layout { grid-template-columns:1fr; grid-template-rows:auto 1fr auto; } }

    /* ═══ SIDEBAR: Fleet Tree ═══ */
    .sidebar { border-right:1px solid var(--ink-rule); overflow-y:auto; padding:0.75rem 0; background:#fff; }
    .sidebar-title { padding:0 0.85rem 0.65rem; border-bottom:1px solid var(--ink-rule); margin-bottom:0.4rem; }
    .agent-group { display:flex; align-items:center; gap:0.35rem; padding:0.3rem 0.85rem; font-size:0.65rem; font-weight:700; color:var(--ink-fade); text-transform:uppercase; letter-spacing:0.12em; cursor:pointer; user-select:none; }
    .agent-group:hover { color:var(--ink-mute); }
    .agent-toggle { font-size:0.55rem; transition:transform 0.15s; display:inline-block; }
    .agent-toggle.collapsed { transform:rotate(-90deg); }
    .agent-item { display:flex; align-items:center; gap:0.45rem; padding:0.28rem 0.85rem; cursor:pointer; font-size:0.82rem; transition:background 0.12s; border-left:2px solid transparent; }
    .agent-item:hover { background:var(--paper-warm); }
    .agent-item.selected { background:var(--paper-warm); border-left-color:var(--accent); }
    .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .dot.ok { background:#22c55e; }
    .dot.warn { background:#f59e0b; }
    .dot.err { background:#ef4444; }
    .dot.idle { background:var(--ink-rule); }
    .agent-label { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:0.82rem; }
    .agent-fw { font-size:0.6rem; font-weight:600; padding:0.08rem 0.35rem; border-radius:3px; letter-spacing:0.04em; }
    .fw-lg { background:#fef2f2; color:var(--fw-langgraph); }
    .fw-cr { background:#fef3c7; color:var(--fw-crewai); }
    .fw-ag { background:#ecfccb; color:var(--fw-agno); }
    .fw-ad { background:#f5f0eb; color:var(--fw-autogen); }
    .fw-or { background:#ede9fe; color:#7c3aed; }
    .indent { padding-left:1.2rem; }
    .indent-2 { padding-left:2rem; }
    .sidebar-footer { padding:0.75rem 0.85rem; border-top:1px solid var(--ink-rule); margin-top:0.5rem; }
    .legend-row { display:flex; align-items:center; gap:0.4rem; font-size:0.7rem; color:var(--ink-fade); margin-bottom:0.25rem; }

    /* ═══ MAIN PANEL ═══ */
    .main { overflow-y:auto; padding:1.25rem; display:flex; flex-direction:column; gap:1.25rem; }

    /* HITL BAR */
    .hitl-bar { background:#fff; border:1px solid var(--ink-rule); border-radius:var(--radius); padding:0.85rem 1rem; box-shadow:var(--shadow); }
    .hitl-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.6rem; }
    .hitl-title { font-size:0.85rem; font-weight:700; }
    .hitl-pip { display:inline-flex; align-items:center; gap:0.3rem; font-size:0.7rem; font-weight:700; padding:0.12rem 0.5rem; border-radius:3px; background:#fef2f2; color:#dc2626; }
    .hitl-pip::before { content:''; width:5px; height:5px; border-radius:50%; background:#dc2626; animation:pulse 1.5s infinite; }
    .hitl-list { display:flex; flex-direction:column; gap:0.15rem; }
    .hitl-item { display:flex; gap:0.5rem; align-items:flex-start; padding:0.4rem 0; font-size:0.8rem; border-bottom:1px solid var(--paper-shadow); }
    .hitl-item:last-child { border-bottom:none; }
    .hitl-time { font-family:var(--font-mono); font-size:0.68rem; color:var(--ink-quiet); white-space:nowrap; margin-top:0.1rem; }
    .hitl-text { flex:1; color:var(--ink-soft); }
    .hitl-source { font-size:0.65rem; color:var(--ink-quiet); margin-top:0.1rem; }

    /* SECTION HEADERS */
    .sec-hdr { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:0.6rem; }
    .sec-title { font-family:var(--font-serif); font-size:1.15rem; font-weight:600; color:var(--ink); }
    .sec-sub { font-size:0.72rem; color:var(--ink-quiet); }

    /* WORK ITEMS: Card grid */
    .work-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:0.6rem; }
    .work-card { background:#fff; border:1px solid var(--ink-rule); border-radius:var(--radius); padding:0.75rem 0.85rem; box-shadow:var(--shadow); transition:border-color 0.15s; display:flex; flex-direction:column; gap:0.45rem; }
    .work-card:hover { border-color:var(--accent); }
    .work-hdr { display:flex; align-items:flex-start; justify-content:space-between; gap:0.5rem; }
    .work-name { font-weight:600; font-size:0.9rem; color:var(--ink); line-height:1.3; flex:1; }
    .work-tags-row { display:flex; align-items:center; gap:0.35rem; flex-wrap:wrap; }
    .work-tag { font-size:0.62rem; padding:0.1rem 0.4rem; border-radius:3px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; }
    .work-tag.shipped { background:#dcfce7; color:#166534; }
    .work-tag.live { background:#dbeafe; color:#1e40af; }
    .work-tag.deployed { background:#f0e7ff; color:#6d28d9; }
    .work-tag.ready { background:#fef3c7; color:#92400e; }
    .work-tag.draft { background:var(--paper-warm); color:var(--ink-fade); }
    .work-tag.in-progress { background:#ede9fe; color:#5b21b6; }
    .pri-pip { font-size:0.62rem; font-weight:800; padding:0.1rem 0.38rem; border-radius:3px; letter-spacing:0.04em; }
    .pri-p0 { background:#fef2f2; color:#dc2626; }
    .pri-p1 { background:#fef3c7; color:#b45309; }
    .pri-p2 { background:var(--paper-warm); color:var(--ink-fade); }
    .work-meta { font-size:0.7rem; color:var(--ink-fade); display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
    .work-meta b { color:var(--ink-mute); font-weight:600; }
    .work-bar { height:4px; background:var(--paper-shadow); border-radius:2px; overflow:hidden; }
    .work-bar-fill { height:100%; border-radius:2px; transition:width 0.4s; }
    .work-bar-fill.high { background:#22c55e; }
    .work-bar-fill.med { background:#f59e0b; }
    .work-bar-fill.low { background:#ef4444; }
    .work-phase { font-family:var(--font-mono); font-size:0.68rem; color:var(--ink-mute); }
    .work-last { font-size:0.74rem; color:var(--ink-soft); line-height:1.4; border-top:1px solid var(--paper-shadow); padding-top:0.4rem; }
    .work-last-kind { font-family:var(--font-mono); font-size:0.62rem; color:var(--ink-quiet); margin-right:0.35rem; }
    .work-evidence { font-family:var(--font-mono); font-size:0.62rem; color:var(--accent); font-weight:600; }

    /* SWIM LANES (Active Pipeline) */
    .lanes-wrap { display:flex; flex-direction:column; gap:0.45rem; }
    .lane { background:#fff; border:1px solid var(--ink-rule); border-radius:var(--radius); padding:0.55rem 0.75rem; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:0.35rem; transition:border-color 0.12s; }
    .lane:hover { border-color:var(--accent-soft); }
    .lane-top { display:flex; align-items:center; gap:0.5rem; }
    .lane-cid { font-family:var(--font-mono); font-size:0.66rem; color:var(--ink-quiet); flex-shrink:0; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .lane-track { flex:1; display:flex; align-items:center; gap:0.2rem; overflow-x:auto; min-width:0; }
    .lane-pill { display:inline-flex; align-items:center; gap:0.25rem; font-family:var(--font-mono); font-size:0.6rem; font-weight:600; padding:0.12rem 0.4rem; border-radius:8px; background:var(--paper-warm); color:var(--ink-mute); white-space:nowrap; cursor:default; }
    .lane-pill .pill-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
    .lane-arrow { font-size:0.55rem; color:var(--ink-quiet); flex-shrink:0; }
    .lane-status { flex-shrink:0; font-size:0.68rem; }
    .lane-status.complete { color:#16a34a; }
    .lane-status.active { color:#2563eb; display:inline-flex; align-items:center; gap:0.25rem; }
    .lane-status.active::before { content:''; width:6px; height:6px; border-radius:50%; background:#2563eb; animation:pulse 1.5s infinite; }
    .lane-summary { font-size:0.74rem; color:var(--ink-soft); padding-left:128px; line-height:1.4; }
    @media(max-width:900px) { .lane-summary { padding-left:0; } }

    /* EVENTS TIMELINE */
    .event-card { background:#fff; border:1px solid var(--ink-rule); border-radius:var(--radius); padding:0.65rem 0.85rem; box-shadow:var(--shadow); margin-bottom:0.35rem; transition:border-color 0.12s; }
    .event-card:hover { border-color:var(--accent-soft); }
    .event-card.new { animation:flash 0.8s ease; }
    @keyframes flash { 0%{background:#f0fdf4;} 100%{background:#fff;} }
    .event-meta { display:flex; gap:0.5rem; align-items:center; margin-bottom:0.3rem; flex-wrap:wrap; }
    .event-time { font-family:var(--font-mono); font-size:0.68rem; color:var(--ink-quiet); }
    .event-who { font-weight:600; font-size:0.78rem; }
    .event-kind-tag { font-size:0.6rem; font-weight:700; padding:0.08rem 0.35rem; border-radius:3px; text-transform:uppercase; letter-spacing:0.03em; background:var(--paper-warm); color:var(--ink-mute); }
    .event-kind-tag.hitl { background:#fef2f2; color:#dc2626; }
    .event-kind-tag.milestone { background:#fef3c7; color:#92400e; }
    .event-kind-tag.roundtable { background:#ede9fe; color:#6d28d9; }
    .event-kind-tag.drift { background:#fef3c7; color:#b45309; }
    .event-kind-tag.shipped { background:#dcfce7; color:#166534; }
    .event-text { font-size:0.82rem; color:var(--ink-soft); line-height:1.5; }
    .event-text b { color:var(--accent); font-weight:600; }
    .event-text em { font-style:normal; color:var(--ink-fade); }

    /* ═══ RIGHT PANEL ═══ */
    .right { border-left:1px solid var(--ink-rule); overflow-y:auto; background:#fff; display:flex; flex-direction:column; }
    .right-hdr { padding:0.7rem 0.85rem; border-bottom:1px solid var(--ink-rule); position:sticky; top:0; background:#fff; z-index:2; display:flex; align-items:center; justify-content:space-between; gap:0.5rem; }
    .right-hdr h4 { font-family:var(--font-serif); font-size:0.95rem; font-weight:600; }
    .back-btn { font-family:var(--font-sans); font-size:0.7rem; font-weight:500; border:1px solid var(--ink-rule); border-radius:4px; background:transparent; color:var(--ink-mute); cursor:pointer; padding:3px 8px; transition:all 0.12s; }
    .back-btn:hover { border-color:var(--ink-mute); color:var(--ink); }
    .comms-list, .detail-pane { padding:0.5rem 0; flex:1; overflow-y:auto; }
    .comm-item { padding:0.55rem 0.85rem; border-bottom:1px solid var(--paper-shadow); }
    .comm-item:last-child { border-bottom:none; }
    .comm-meta { display:flex; gap:0.4rem; align-items:center; margin-bottom:0.2rem; }
    .comm-time { font-family:var(--font-mono); font-size:0.65rem; color:var(--ink-quiet); }
    .comm-who { font-weight:600; font-size:0.75rem; }
    .comm-text { font-size:0.78rem; color:var(--ink-soft); line-height:1.45; }
    .comm-text b { color:var(--accent); font-weight:600; }

    /* ═══ AGENT DETAIL PANE ═══ */
    .detail-section { padding:0.65rem 0.85rem; border-bottom:1px solid var(--paper-shadow); }
    .detail-section:last-child { border-bottom:none; }
    .detail-section h5 { font-size:0.65rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-fade); margin-bottom:0.4rem; }
    .detail-agent-hdr { display:flex; align-items:center; gap:0.5rem; padding:0.7rem 0.85rem; border-bottom:1px solid var(--paper-shadow); }
    .detail-agent-name { font-family:var(--font-serif); font-size:1rem; font-weight:600; flex:1; }
    .detail-kv { display:flex; gap:0.4rem; font-size:0.74rem; line-height:1.5; align-items:flex-start; }
    .detail-kv dt { font-weight:600; color:var(--ink-mute); min-width:90px; flex-shrink:0; }
    .detail-kv dd { color:var(--ink-soft); flex:1; word-break:break-word; }
    .detail-kv dd.mono { font-family:var(--font-mono); font-size:0.7rem; }
    details.detail-collapse { margin-top:0.4rem; }
    details.detail-collapse summary { font-size:0.7rem; color:var(--ink-fade); cursor:pointer; padding:0.15rem 0; }
    details.detail-collapse summary:hover { color:var(--ink-mute); }
    details.detail-collapse pre { font-family:var(--font-mono); font-size:0.66rem; color:var(--ink-soft); background:var(--paper-warm); padding:0.4rem 0.5rem; border-radius:4px; margin-top:0.3rem; white-space:pre-wrap; word-break:break-word; max-height:180px; overflow-y:auto; }
    .timeline-item { padding:0.35rem 0; border-bottom:1px dotted var(--paper-shadow); font-size:0.74rem; }
    .timeline-item:last-child { border-bottom:none; }
    .timeline-meta { display:flex; gap:0.35rem; align-items:center; margin-bottom:0.15rem; flex-wrap:wrap; }
    .timeline-summary { color:var(--ink-soft); line-height:1.4; }
    .work-touched { padding:0.35rem 0; border-bottom:1px dotted var(--paper-shadow); font-size:0.74rem; }
    .work-touched:last-child { border-bottom:none; }
    .work-touched-title { font-weight:600; color:var(--ink); margin-bottom:0.1rem; }
    .work-touched-meta { font-size:0.66rem; color:var(--ink-quiet); font-family:var(--font-mono); }
    .rollup-card { background:var(--paper-warm); border-radius:4px; padding:0.5rem 0.6rem; font-size:0.72rem; }
    .rollup-card .rollup-cid { font-family:var(--font-mono); font-size:0.62rem; color:var(--ink-quiet); margin-top:0.3rem; }
    .rollup-reads { margin-top:0.4rem; }
    .rollup-reads li { font-family:var(--font-mono); font-size:0.66rem; color:var(--ink-mute); list-style:none; padding:0.1rem 0; word-break:break-word; }
    .rollup-reads li::before { content:'→ '; color:var(--ink-quiet); }

    /* ═══ LOADING / ERROR ═══ */
    .loading { text-align:center; padding:1.5rem; color:var(--ink-fade); font-size:0.85rem; }
    .loading::after { content:''; display:inline-block; width:14px; height:14px; border:2px solid var(--ink-rule); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; margin-left:0.4rem; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .err-banner { background:#fef2f2; color:#dc2626; padding:0.6rem 0.85rem; border-radius:var(--radius); font-size:0.82rem; }
    .empty { color:var(--ink-quiet); font-size:0.85rem; padding:0.6rem 0; font-style:italic; }

    /* ═══ MCP PANEL ═══ */
    .mcp-strip { display:flex; gap:1rem; flex-wrap:wrap; font-size:0.72rem; color:var(--ink-fade); }
    .mcp-kv dt { font-weight:600; margin-right:0.3rem; }
    .mcp-kv dd { display:inline; font-family:var(--font-mono); }

    /* Scrollbar */
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--ink-rule); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--ink-fade); }
  </style>
</head>
<body>

<!-- ═══ TOP BAR ═══ -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">ACMI <span>Ops Center</span></div>
    <span class="topbar-badge">Live</span>
  </div>
  <div class="topbar-right">
    <span class="live-dot" id="dot"></span>
    <span id="statusLabel">connecting</span>
    <span class="refresh-info" id="refreshInfo"></span>
  </div>
</div>

<!-- ═══ LAYOUT ═══ -->
<div class="layout">

  <!-- SIDEBAR: Fleet -->
  <div class="sidebar">
    <div class="sidebar-title"><span class="meta">Fleet · <span id="agentCount">—</span> agents</span></div>
    <div id="fleetTree"><div class="loading">Loading…</div></div>
    <div class="sidebar-footer">
      <div class="legend-row"><span class="dot ok"></span> active</div>
      <div class="legend-row"><span class="dot warn"></span> degraded</div>
      <div class="legend-row"><span class="dot err"></span> offline</div>
      <div class="legend-row"><span class="dot idle"></span> idle</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- MCP status strip -->
    <div class="mcp-strip" id="mcpStrip"><div class="loading">MCP…</div></div>

    <!-- HITL Queue -->
    <div class="hitl-bar" id="hitlBar" style="display:none">
      <div class="hitl-header">
        <div class="hitl-title">⚡ Action Inbox</div>
        <div class="hitl-pip" id="hitlPip">0 pending</div>
      </div>
      <div class="hitl-list" id="hitlList"></div>
    </div>

    <!-- Work Tracker -->
    <div>
      <div class="sec-hdr">
        <div class="sec-title">Work Tracker</div>
        <div class="sec-sub" id="workSub"></div>
      </div>
      <div class="work-grid" id="workGrid"><div class="loading">Loading…</div></div>
    </div>

    <!-- Active Pipeline (Swim Lanes) -->
    <div>
      <div class="sec-hdr">
        <div class="sec-title">Active Pipeline</div>
        <div class="sec-sub" id="lanesSub"></div>
      </div>
      <div class="lanes-wrap" id="lanesWrap"><div class="loading">Loading…</div></div>
    </div>

    <!-- Events -->
    <div>
      <div class="sec-hdr">
        <div class="sec-title">Activity</div>
        <div class="sec-sub" id="eventSub"></div>
      </div>
      <div id="eventList"><div class="loading">Loading…</div></div>
    </div>
  </div>

  <!-- RIGHT: Comms / Agent Detail -->
  <div class="right">
    <div class="right-hdr">
      <div>
        <h4 id="rightTitle">Coordination</h4>
        <div class="sec-sub" id="commsSub" style="margin-top:0.15rem"></div>
      </div>
      <button class="back-btn" id="backBtn" style="display:none" onclick="deselectAgent()">✕ Back</button>
    </div>
    <div class="comms-list" id="commsList"><div class="loading">Loading…</div></div>
    <div class="detail-pane" id="detailPane" style="display:none"></div>
  </div>

</div>

<script>
const BASE = window.location.origin;
const INTERVAL = 30000;
let countdown = INTERVAL / 1000;
let state = { fleet:null, events:null, comms:null, hitl:null, mcp:null, work:null, chains:null };
let selectedAgentId = null;
let agentDetailCache = {};

// ─── Helpers ───
function ts(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  return d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
}
function timeAgo(ms) {
  if (!ms) return '';
  const m = Math.floor((Date.now() - ms) / 60000);
  if (m < 1) return 'now';
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  return Math.floor(h / 24) + 'd';
}
function trunc(s, n = 180) { return s && s.length > n ? s.substring(0, n) + '…' : (s || ''); }
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtKind(k) {
  if (!k) return '';
  return k.replace(/^\[|\]$/g, '').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}
function kindAbbr(k) {
  if (!k) return '?';
  const s = k.replace(/^\[|\]$/g, '');
  // Take first letters of each segment up to 4 chars
  const parts = s.split(/[-_]/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0] + (parts[2]?.[0] || '')).toUpperCase();
  return s.slice(0, 4).toUpperCase();
}
function agentColor(id) {
  const map = { 'claude-engineer':'#7c3aed','claude-engineer-cloud':'#7c3aed','claude-web':'#7c3aed','claude-desktop':'#7c3aed','claude-opus-4-7':'#7c3aed','claude-sonnet-4-6':'#7c3aed','claude-haiku-4-5':'#7c3aed','claude-3-haiku':'#7c3aed','bentley':'#2d4a3e','bentley-temp':'#2d4a3e','antigravity':'#c4572a','gemini-cli':'#2563eb','folana':'#db2777','drift-remediator':'#f59e0b','claude-local':'#7c3aed','claude':'#7c3aed','claude-web-sonnet':'#7c3aed','claude-web-opus':'#7c3aed','claude-web-haiku':'#7c3aed','claude-engineer-opus':'#7c3aed' };
  return map[id] || map[id?.toLowerCase()] || '#6b7280';
}
function fwClass(fw) {
  const m = { langgraph:'fw-lg', crewai:'fw-cr', agno:'fw-ag', autogen:'fw-ad', orchestrator:'fw-or' };
  return m[fw?.toLowerCase()] || '';
}
function statusClass(s) { return s === 'ok' ? 'ok' : s === 'warn' ? 'warn' : s === 'err' ? 'err' : 'idle'; }
function pctClass(p) { return p >= 75 ? 'high' : p >= 40 ? 'med' : 'low'; }
function tagClass(s) {
  const u = (s || '').toUpperCase();
  return u === 'SHIPPED' ? 'shipped' : u === 'LIVE' ? 'live' : u === 'DEPLOYED' ? 'deployed' : u === 'READY' ? 'ready' : u === 'IN_PROGRESS' ? 'in-progress' : 'draft';
}
function priClass(p) {
  const u = (p || '').toUpperCase();
  if (u === 'P0') return 'pri-p0';
  if (u === 'P1') return 'pri-p1';
  return 'pri-p2';
}

// ─── Render: Fleet Tree ───
function renderFleet() {
  const el = document.getElementById('fleetTree');
  const f = state.fleet;
  if (!f || !f.fleet) { el.innerHTML = '<div class="err-banner">Fleet API error</div>'; return; }

  let count = 0;
  function countAll(n) { if (n.model || n.status) count++; (n.children||[]).forEach(countAll); }
  countAll(f.fleet);
  document.getElementById('agentCount').textContent = count;

  let html = '';
  function renderNode(n, depth = 0) {
    const cls = depth === 0 ? '' : depth === 1 ? 'indent' : 'indent-2';
    if (!n.model && !n.status) {
      html += `<div class="agent-group ${cls}" data-group="1">
        <span class="agent-toggle">▼</span> ${escapeHtml(n.label || n.id)}
      </div>`;
    } else {
      const sc = statusClass(n.status);
      const fw = fwClass(n.framework);
      const aid = n.id || n.label || '';
      const selCls = aid === selectedAgentId ? 'selected' : '';
      html += `<div class="agent-item ${cls} ${selCls}" data-agent-id="${escapeHtml(aid)}" data-framework="${escapeHtml(n.framework || '')}" data-label="${escapeHtml(n.label || aid)}">
        <span class="dot ${sc}"></span>
        <span class="agent-label">${escapeHtml(n.label || n.id)}</span>
        ${fw ? `<span class="agent-fw ${fw}">${escapeHtml((n.framework||'').slice(0,2).toUpperCase())}</span>` : ''}
      </div>`;
    }
    (n.children || []).forEach(c => renderNode(c, depth + 1));
  }
  renderNode(f.fleet);
  el.innerHTML = html;

  // Wire group toggles
  el.querySelectorAll('.agent-group').forEach(g => {
    g.addEventListener('click', () => {
      const tog = g.querySelector('.agent-toggle');
      tog?.classList.toggle('collapsed');
      const collapsed = tog?.classList.contains('collapsed');
      let s = g.nextElementSibling;
      while (s && !s.classList.contains('agent-group')) {
        if (s.classList.contains('agent-item') || s.classList.contains('indent') || s.classList.contains('indent-2')) {
          s.style.display = collapsed ? 'none' : '';
        }
        s = s.nextElementSibling;
      }
    });
  });

  // Wire agent click handlers
  el.querySelectorAll('.agent-item').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const aid = item.getAttribute('data-agent-id');
      if (!aid) return;
      selectAgent(aid, {
        label: item.getAttribute('data-label'),
        framework: item.getAttribute('data-framework'),
      });
    });
  });
}

// ─── Render: HITL ───
function renderHITL() {
  const bar = document.getElementById('hitlBar');
  const list = document.getElementById('hitlList');
  const pip = document.getElementById('hitlPip');
  const h = state.hitl;
  if (!h || !h.pending?.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  pip.textContent = h.count_pending + ' pending';
  const seen = new Set();
  let html = '';
  h.pending.slice(0, 6).forEach(item => {
    const key = trunc(item.summary, 60);
    if (seen.has(key)) return;
    seen.add(key);
    html += `<div class="hitl-item">
      <span class="hitl-time">${ts(item.ts)}</span>
      <span class="hitl-text">${escapeHtml(trunc(item.summary, 150))}</span>
      <span class="hitl-source">${escapeHtml(item.source || '')}</span>
    </div>`;
  });
  if (h.count_pending > 6) html += `<div style="font-size:0.75rem;color:var(--ink-quiet);padding:0.35rem 0;">+${h.count_pending - 6} more</div>`;
  list.innerHTML = html;
}

// ─── Render: Events ───
function renderEvents() {
  const el = document.getElementById('eventList');
  const sub = document.getElementById('eventSub');
  const ev = state.events;
  if (!ev?.events) { el.innerHTML = '<div class="err-banner">Events API error</div>'; return; }
  sub.textContent = ev.count + ' events';

  const seen = new Set();
  let html = '';
  ev.events.slice(0, 35).forEach(e => {
    const key = trunc(e.summary || e.text, 50) + e.kind;
    if (key.includes('drift') && seen.has('drift')) return;
    if (key.includes('drift')) seen.add('drift');
    if (seen.has(key)) return;
    seen.add(key);

    let kindCls = 'event-kind-tag';
    const k = e.kind || '';
    if (k.includes('hitl')) kindCls += ' hitl';
    else if (k.includes('milestone') || k.includes('shipped') || k.includes('asset-shipped')) kindCls += ' shipped';
    else if (k.includes('roundtable')) kindCls += ' roundtable';
    else if (k.includes('drift')) kindCls += ' drift';

    const ac = agentColor(e.a || e.source || '');
    let text = escapeHtml(trunc(e.text || e.summary || '', 280));
    text = text.replace(/\[([^\]]+)\]/g, '<b>[$1]</b>');
    text = text.replace(/@([\w-]+)/g, '<em> @$1</em>');

    html += `<div class="event-card">
      <div class="event-meta">
        <span class="event-time">${ts(e.ts)}</span>
        <span class="event-who" style="color:${ac}">${escapeHtml(e.a || e.source || '')}</span>
        <span class="${kindCls}">${escapeHtml(fmtKind(k))}</span>
      </div>
      <div class="event-text">${text}</div>
    </div>`;
  });
  el.innerHTML = html || '<div style="color:var(--ink-quiet);font-size:0.85rem;">No events</div>';
}

// ─── Render: Comms ───
function renderComms() {
  const el = document.getElementById('commsList');
  const sub = document.getElementById('commsSub');
  const c = state.comms;
  if (!c?.events) { el.innerHTML = '<div class="err-banner">Comms API error</div>'; return; }
  if (!selectedAgentId) sub.textContent = c.count + ' messages';

  let html = '';
  c.events.slice(0, 30).forEach(e => {
    const ac = agentColor(e.a || e.source || '');
    let text = escapeHtml(trunc(e.summary || '', 200));
    text = text.replace(/\[([^\]]+)\]/g, '<b>[$1]</b>');
    text = text.replace(/@([\w-]+)/g, '<em> @$1</em>');
    html += `<div class="comm-item">
      <div class="comm-meta">
        <span class="comm-time">${ts(e.ts)}</span>
        <span class="comm-who" style="color:${ac}">${escapeHtml(e.a || e.source || '')}</span>
      </div>
      <div class="comm-text">${text}</div>
    </div>`;
  });
  el.innerHTML = html || '<div style="color:var(--ink-quiet);font-size:0.85rem;">No messages</div>';
}

// ─── Render: Work Items ───
function renderWork() {
  const el = document.getElementById('workGrid');
  const sub = document.getElementById('workSub');
  const w = state.work;
  if (!w?.items) { el.innerHTML = '<div class="err-banner">Work API error</div>'; return; }

  // Sort: P0 first, then by last_event_ts desc
  const items = [...w.items].sort((a, b) => {
    const pa = (a.priority || 'P2').toUpperCase();
    const pb = (b.priority || 'P2').toUpperCase();
    if (pa !== pb) {
      if (pa === 'P0') return -1;
      if (pb === 'P0') return 1;
      if (pa === 'P1') return -1;
      if (pb === 'P1') return 1;
    }
    return (b.last_event_ts || 0) - (a.last_event_ts || 0);
  });

  // Sub-line counts
  const total = items.length;
  const liveCount = items.filter(i => (i.status || '').toUpperCase() === 'LIVE').length;
  const p0Count = items.filter(i => (i.priority || '').toUpperCase() === 'P0').length;
  const subParts = [`${total} item${total === 1 ? '' : 's'}`];
  if (liveCount) subParts.push(`${liveCount} LIVE`);
  if (p0Count) subParts.push(`${p0Count} P0`);
  sub.textContent = subParts.join(' · ');

  let html = '';
  items.slice(0, 24).forEach(item => {
    const status = (item.status || 'DRAFT').toUpperCase();
    const tagCls = tagClass(status);
    const priority = (item.priority || 'P2').toUpperCase();
    const priCls = priClass(priority);
    const pct = item.phase_progress_pct != null
      ? Math.max(0, Math.min(100, Math.round(item.phase_progress_pct)))
      : (item.phases_total ? Math.round((item.phases_complete / item.phases_total) * 100) : 0);
    const pCls = pctClass(pct);
    const owner = item.owner && item.owner !== '—' ? item.owner : '';
    const lastSummary = trunc(item.last_event_summary || '', 100);
    const lastKind = item.last_event_kind ? fmtKind(item.last_event_kind) : '';
    const evidence = (item.evidence_count || 0) > 0 ? `<span class="work-evidence">${item.evidence_count} evidence</span>` : '';
    const phaseStr = item.phases_total ? `${item.phases_complete || 0}/${item.phases_total}` : '';
    const ageStr = item.last_event_ts ? timeAgo(item.last_event_ts) : (item.age_iso || '');

    html += `<div class="work-card">
      <div class="work-hdr">
        <div class="work-name">${escapeHtml(item.title || item.id)}</div>
        <div class="work-tags-row">
          <span class="pri-pip ${priCls}">${escapeHtml(priority)}</span>
          <span class="work-tag ${tagCls}">${escapeHtml(status)}</span>
        </div>
      </div>
      <div class="work-meta">
        ${owner ? `<span><b>${escapeHtml(owner)}</b></span>` : ''}
        ${ageStr ? `<span>· ${escapeHtml(ageStr)} ago</span>` : ''}
        ${evidence ? `<span>· ${evidence}</span>` : ''}
      </div>
      ${phaseStr ? `
      <div>
        <div class="work-bar"><div class="work-bar-fill ${pCls}" style="width:${pct}%"></div></div>
        <div class="work-phase">phase ${phaseStr} · ${pct}%</div>
      </div>` : ''}
      ${lastSummary ? `<div class="work-last">
        ${lastKind ? `<span class="work-last-kind">${escapeHtml(lastKind)}</span>` : ''}${escapeHtml(lastSummary)}
      </div>` : ''}
    </div>`;
  });
  el.innerHTML = html || '<div class="empty">No work items</div>';
}

// ─── Render: Active Pipeline Swim Lanes ───
function renderChains() {
  const el = document.getElementById('lanesWrap');
  const sub = document.getElementById('lanesSub');
  const c = state.chains;
  if (!c?.chains) { el.innerHTML = '<div class="err-banner">Chains API error</div>'; return; }

  const chains = [...c.chains].sort((a, b) => (b.last_ts || 0) - (a.last_ts || 0));
  const visible = chains.slice(0, 12);
  sub.textContent = `Last 30 min — ${chains.length} chain${chains.length === 1 ? '' : 's'} in flight`;

  if (!visible.length) {
    el.innerHTML = '<div class="empty">No active chains in last 30 min — fleet idle</div>';
    return;
  }

  let html = '';
  visible.forEach(ch => {
    const cid = ch.root_correlation_id || '—';
    const cidShort = trunc(cid, 18);
    const events = ch.events || [];
    let trackHtml = '';
    events.slice(0, 18).forEach((ev, idx) => {
      const ac = agentColor(ev.agent || '');
      const abbr = kindAbbr(ev.kind || '');
      const tip = `${ev.agent || '?'} · ${ev.kind || '?'}\n${ts(ev.ts)}\n${ev.summary || ''}`;
      trackHtml += `${idx > 0 ? '<span class="lane-arrow">›</span>' : ''}<span class="lane-pill" title="${escapeHtml(tip)}"><span class="pill-dot" style="background:${ac}"></span>${escapeHtml(abbr)}</span>`;
    });
    if (events.length > 18) trackHtml += `<span class="lane-arrow">… +${events.length - 18}</span>`;

    const statusHtml = ch.is_complete
      ? `<span class="lane-status complete" title="complete">✓</span>`
      : `<span class="lane-status active" title="active">live</span>`;

    const summary = trunc(ch.last_event_summary || '', 120);

    html += `<div class="lane">
      <div class="lane-top">
        <span class="lane-cid mono" title="${escapeHtml(cid)}">${escapeHtml(cidShort)}</span>
        <span class="lane-track">${trackHtml}</span>
        ${statusHtml}
      </div>
      ${summary ? `<div class="lane-summary">${escapeHtml(summary)}</div>` : ''}
    </div>`;
  });
  el.innerHTML = html;
}

// ─── Render: MCP ───
function renderMCP() {
  const el = document.getElementById('mcpStrip');
  const m = state.mcp;
  if (!m) { el.innerHTML = '<span class="meta">MCP offline</span>'; return; }
  el.innerHTML = `
    <div class="mcp-kv"><dt>MCP Server</dt><dd class="mono">${escapeHtml(m.name || '—')} v${escapeHtml(m.version || '?')}</dd></div>
    <div class="mcp-kv"><dt>Protocol</dt><dd class="mono">${escapeHtml(m.protocolVersion || '?')}</dd></div>
    <div class="mcp-kv"><dt>Tools</dt><dd class="mono">${m.toolCount || 0}</dd></div>
    <div class="mcp-kv"><dt>Transport</dt><dd class="mono">${escapeHtml(m.transport || '?')}</dd></div>
  `;
}

// ─── Agent Detail (right-pane toggle) ───
async function selectAgent(agentId, hint) {
  selectedAgentId = agentId;
  // Highlight selected
  document.querySelectorAll('.agent-item').forEach(i => {
    i.classList.toggle('selected', i.getAttribute('data-agent-id') === agentId);
  });
  // Toggle pane visibility
  document.getElementById('commsList').style.display = 'none';
  document.getElementById('detailPane').style.display = 'block';
  document.getElementById('backBtn').style.display = 'inline-block';
  document.getElementById('rightTitle').textContent = 'Agent Detail';
  document.getElementById('commsSub').textContent = hint?.label || agentId;

  // Loading state
  document.getElementById('detailPane').innerHTML = '<div class="loading">Loading agent…</div>';

  try {
    const res = await fetch(BASE + '/api/agent/' + encodeURIComponent(agentId));
    const data = await res.json();
    agentDetailCache[agentId] = data;
    renderAgentDetail(agentId, data, hint);
  } catch (err) {
    document.getElementById('detailPane').innerHTML = `<div class="err-banner" style="margin:0.85rem;">Failed to load agent ${escapeHtml(agentId)}</div>`;
  }
}

function deselectAgent() {
  selectedAgentId = null;
  document.querySelectorAll('.agent-item.selected').forEach(i => i.classList.remove('selected'));
  document.getElementById('commsList').style.display = '';
  document.getElementById('detailPane').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('rightTitle').textContent = 'Coordination';
  // Restore comms sub
  if (state.comms?.count != null) {
    document.getElementById('commsSub').textContent = state.comms.count + ' messages';
  } else {
    document.getElementById('commsSub').textContent = '';
  }
}

function renderAgentDetail(agentId, data, hint) {
  const el = document.getElementById('detailPane');
  const profile = data?.profile || {};
  const signals = data?.signals || {};
  const timeline = Array.isArray(data?.timeline) ? data.timeline : [];
  const rollup = data?.rollup_latest;
  const ac = agentColor(agentId);
  const fw = profile.framework || hint?.framework || '';
  const fwCls = fwClass(fw);

  // Header
  let html = `<div class="detail-agent-hdr">
    <span class="dot ${statusClass(signals.status)}" style="background:${ac}"></span>
    <span class="detail-agent-name">${escapeHtml(profile.label || hint?.label || agentId)}</span>
    ${fw ? `<span class="agent-fw ${fwCls}">${escapeHtml(fw.slice(0, 2).toUpperCase())}</span>` : ''}
  </div>`;

  // Profile
  html += `<div class="detail-section"><h5>Profile</h5>`;
  const profileFields = [
    ['ID', agentId, true],
    ['Model', profile.model || '—', true],
    ['Role', profile.role || '—', false],
    ['Scope', profile.scope || '—', false],
  ];
  profileFields.forEach(([k, v, mono]) => {
    html += `<dl class="detail-kv"><dt>${escapeHtml(k)}</dt><dd${mono ? ' class="mono"' : ''}>${escapeHtml(String(v))}</dd></dl>`;
  });
  if (profile.behavioral_invariants) {
    const bi = Array.isArray(profile.behavioral_invariants) ? profile.behavioral_invariants.join('\n') : (typeof profile.behavioral_invariants === 'object' ? JSON.stringify(profile.behavioral_invariants, null, 2) : String(profile.behavioral_invariants));
    html += `<details class="detail-collapse"><summary>behavioral_invariants ▾</summary><pre>${escapeHtml(bi)}</pre></details>`;
  }
  html += `</div>`;

  // Signals
  html += `<div class="detail-section"><h5>Signals</h5>`;
  if (Object.keys(signals).length === 0) {
    html += `<div class="empty">No signals</div>`;
  } else {
    const sigOrder = ['status', 'current_focus', 'last_heartbeat', 'mode', 'lane', 'health'];
    const seen = new Set();
    sigOrder.forEach(k => {
      if (signals[k] != null) {
        seen.add(k);
        const v = k === 'last_heartbeat' && typeof signals[k] === 'number' ? timeAgo(signals[k]) + ' ago' : signals[k];
        html += `<dl class="detail-kv"><dt>${escapeHtml(k)}</dt><dd>${escapeHtml(String(v))}</dd></dl>`;
      }
    });
    Object.keys(signals).forEach(k => {
      if (seen.has(k)) return;
      const v = signals[k];
      if (v == null || typeof v === 'object') return;
      html += `<dl class="detail-kv"><dt>${escapeHtml(k)}</dt><dd>${escapeHtml(String(v))}</dd></dl>`;
    });
  }
  html += `</div>`;

  // Recent Timeline
  html += `<div class="detail-section"><h5>Recent Timeline</h5>`;
  if (!timeline.length) {
    html += `<div class="empty">No recent events</div>`;
  } else {
    timeline.slice(0, 10).forEach(e => {
      const k = e.kind || '';
      let kCls = 'event-kind-tag';
      if (k.includes('hitl')) kCls += ' hitl';
      else if (k.includes('milestone') || k.includes('shipped')) kCls += ' shipped';
      else if (k.includes('roundtable')) kCls += ' roundtable';
      else if (k.includes('drift')) kCls += ' drift';
      html += `<div class="timeline-item">
        <div class="timeline-meta">
          <span class="event-time">${ts(e.ts)}</span>
          <span class="${kCls}">${escapeHtml(fmtKind(k))}</span>
        </div>
        <div class="timeline-summary">${escapeHtml(trunc(e.summary || e.text || '', 180))}</div>
      </div>`;
    });
  }
  html += `</div>`;

  // Recent Work Items touched (derive from state.work)
  html += `<div class="detail-section"><h5>Recent Work Items</h5>`;
  const workItems = state.work?.items || [];
  const touched = workItems.filter(it => it.owner === agentId || (it.signals && (it.signals.last_actor === agentId || it.signals.owner === agentId))).slice(0, 5);
  if (!touched.length) {
    html += `<div class="empty">No work items linked</div>`;
  } else {
    touched.forEach(it => {
      const status = (it.status || 'DRAFT').toUpperCase();
      html += `<div class="work-touched">
        <div class="work-touched-title">${escapeHtml(it.title || it.id)}</div>
        <div class="work-touched-meta">${escapeHtml(status)} · ${escapeHtml((it.priority || 'P2').toUpperCase())} · ${it.last_event_ts ? timeAgo(it.last_event_ts) + ' ago' : '—'}</div>
      </div>`;
    });
  }
  html += `</div>`;

  // Rollup pointer
  if (rollup) {
    html += `<div class="detail-section"><h5>Rollup Pointer</h5>`;
    html += `<div class="rollup-card">
      <div>${escapeHtml(trunc(rollup.summary || rollup.title || 'rollup', 200))}</div>
      ${rollup.cid ? `<div class="rollup-cid">cid: ${escapeHtml(rollup.cid)}</div>` : ''}`;
    const reads = rollup.next_session_first_reads || rollup.first_reads || [];
    if (Array.isArray(reads) && reads.length) {
      html += `<ul class="rollup-reads">`;
      reads.forEach(r => {
        html += `<li>${escapeHtml(typeof r === 'string' ? r : (r.path || r.cid || JSON.stringify(r)))}</li>`;
      });
      html += `</ul>`;
    }
    html += `</div></div>`;
  }

  el.innerHTML = html;
}

// ─── Fetch All ───
async function fetchAll() {
  const [fleet, hitl, events, comms, mcp, work, chains] = await Promise.all([
    fetch(BASE + '/api/fleet').then(r => r.json()).catch(() => null),
    fetch(BASE + '/api/hitl').then(r => r.json()).catch(() => null),
    fetch(BASE + '/api/events?limit=100').then(r => r.json()).catch(() => null),
    fetch(BASE + '/api/comms').then(r => r.json()).catch(() => null),
    fetch(BASE + '/api/mcp').then(r => r.json()).catch(() => null),
    fetch(BASE + '/api/work').then(r => r.json()).catch(() => null),
    fetch(BASE + '/api/chains').then(r => r.json()).catch(() => null),
  ]);

  state = { fleet, events, comms, hitl, mcp, work, chains };

  // Status indicator
  const dot = document.getElementById('dot');
  const label = document.getElementById('statusLabel');
  const ok = fleet && events && comms;
  dot.className = ok ? 'live-dot' : 'live-dot err';
  label.textContent = ok ? 'live · ' + new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',hour12:false}) : 'partial';

  renderFleet();
  renderHITL();
  renderEvents();
  renderComms();
  renderWork();
  renderChains();
  renderMCP();

  // Refresh agent detail if one is selected
  if (selectedAgentId) {
    try {
      const res = await fetch(BASE + '/api/agent/' + encodeURIComponent(selectedAgentId));
      const data = await res.json();
      agentDetailCache[selectedAgentId] = data;
      renderAgentDetail(selectedAgentId, data, { label: selectedAgentId });
    } catch (e) { /* keep prior render */ }
  }

  countdown = INTERVAL / 1000;
}

function tick() {
  const el = document.getElementById('refreshInfo');
  if (countdown > 0) {
    el.textContent = countdown + 's';
    countdown--;
    setTimeout(tick, 1000);
  }
}

// ─── Init ───
fetchAll();
tick();
setInterval(fetchAll, INTERVAL);
</script>
