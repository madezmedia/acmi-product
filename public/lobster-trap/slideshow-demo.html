<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Slideshow Demo — Lobster Trap + Crypt Keeper (4:50, 1920×1080)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght,ital@8..60,400..700,0;8..60,400..700,1&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #faf9f5;
    --paper-warm: #f4f2eb;
    --ink: #1a1a1a;
    --ink-soft: #2c2c2a;
    --ink-mute: #4a4a48;
    --ink-fade: #7a7a76;
    --ink-rule: #d4d2cc;
    --accent: #2d4a3e;
    --accent-soft: #5a7d6f;
    --accent-quiet: #1c3027;
    --pink: #E5007D;
    --err: #b94a3a;
    --ok: #4a7c59;
    --serif: 'Source Serif 4', Georgia, serif;
    --sans:  'Inter', system-ui, sans-serif;
    --mono:  'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  html, body { margin: 0; padding: 0; background: #111; overflow: hidden; }
  body { font-family: var(--sans); color: var(--ink); }
  #root { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const W = 1920, H = 1080;
const DURATION = 290; // 4:50

const c = {
  paper: '#faf9f5', paperWarm: '#f4f2eb', ink: '#1a1a1a', inkSoft: '#2c2c2a',
  inkMute: '#4a4a48', inkFade: '#7a7a76', inkRule: '#d4d2cc',
  accent: '#2d4a3e', accentSoft: '#5a7d6f', accentQuiet: '#1c3027',
  pink: '#E5007D', err: '#b94a3a', ok: '#4a7c59',
};

// ============================================================
// SHARED COMPONENTS
// ============================================================

// Top chrome — shows current ACT
function ActChrome({ actNum, actName, time }) {
  const mm = String(Math.floor(time / 60)).padStart(2,'0');
  const ss = String(Math.floor(time % 60)).padStart(2,'0');
  return (
    <div style={{
      position: 'absolute', top: 0, left: 0, right: 0, height: 56,
      padding: '0 60px',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      background: 'rgba(250,249,245,0.94)',
      borderBottom: `1px solid ${c.inkRule}`,
      fontFamily: 'JetBrains Mono', fontSize: 14, color: c.inkFade,
      letterSpacing: '0.18em', textTransform: 'uppercase',
      zIndex: 200,
      backdropFilter: 'blur(8px)',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
        <img src="assets/madez-splatter.png" style={{ width: 28, height: 28, objectFit: 'contain' }} />
        <span>Mad EZ Media · IBM Bob Hackathon</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
        <span style={{ color: c.accent, fontWeight: 700 }}>ACT {actNum} · {actName}</span>
        <span style={{ opacity: 0.4 }}>·</span>
        <span style={{ color: c.ink, fontWeight: 600 }}>{mm}:{ss} / 04:50</span>
      </div>
    </div>
  );
}

// Captions track — burned-in subtitles for VO
function VOCaption({ text, start, end, position = 'bottom' }) {
  return (
    <Sprite start={start} end={end}>
      {({ localTime, duration }) => {
        const fadeIn = clamp(localTime / 0.3, 0, 1);
        const fadeOut = clamp((duration - localTime) / 0.3, 0, 1);
        const opacity = Math.min(fadeIn, fadeOut);
        return (
          <div style={{
            position: 'absolute',
            left: 100, right: 100,
            bottom: position === 'bottom' ? 110 : 'auto',
            top: position === 'top' ? 110 : 'auto',
            display: 'flex', justifyContent: 'center',
            zIndex: 150,
            opacity,
            pointerEvents: 'none',
          }}>
            <div style={{
              padding: '14px 26px',
              background: 'rgba(10,10,11,0.78)',
              color: '#fff',
              fontFamily: 'Inter, sans-serif',
              fontWeight: 600,
              fontSize: 32,
              lineHeight: 1.28,
              letterSpacing: '-0.012em',
              borderRadius: 6,
              maxWidth: 1500,
              textAlign: 'center',
              backdropFilter: 'blur(6px)',
              boxShadow: '0 4px 18px rgba(0,0,0,0.4)',
            }} dangerouslySetInnerHTML={{ __html: text }} />
          </div>
        );
      }}
    </Sprite>
  );
}

// Progress bar at bottom
function Progress() {
  const time = useTime();
  const pct = (time / DURATION) * 100;
  // Act markers at 0, 60, 180, 270, 290
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0, height: 8,
      background: 'rgba(0,0,0,0.6)',
      zIndex: 250,
    }}>
      <div style={{
        position: 'absolute', top: 0, left: 0, bottom: 0,
        width: `${pct}%`,
        background: 'linear-gradient(90deg, #5a7d6f, #2d4a3e)',
        transition: 'width 100ms linear',
      }} />
      {/* Act markers */}
      {[60, 180, 270].map(t => (
        <div key={t} style={{
          position: 'absolute', top: 0, bottom: 0,
          left: `${(t / DURATION) * 100}%`,
          width: 2, background: '#fff', opacity: 0.6,
        }} />
      ))}
    </div>
  );
}

// ============================================================
// ACT 1 — THE PROBLEM (0:00 → 1:00)
// ============================================================

// 0:00 → 0:05 — Black cold open
function A1ColdOpen() {
  return (
    <Sprite start={0} end={5}>
      {({ localTime }) => {
        const typed = Math.min(localTime / 1.2, 1);
        const fullText = '> bob';
        const visible = fullText.slice(0, Math.floor(typed * fullText.length));
        const blink = Math.floor(localTime * 3) % 2 === 0;
        const fadeOut = clamp((5 - localTime) / 0.4, 0, 1);
        return (
          <div style={{
            position: 'absolute', inset: 0,
            background: '#0a0a0b',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            opacity: fadeOut,
          }}>
            <div style={{
              fontFamily: 'JetBrains Mono', fontSize: 78,
              color: '#a4cba0', letterSpacing: '-0.01em',
            }}>
              {visible}<span style={{ opacity: blink ? 1 : 0 }}>▎</span>
            </div>
            {/* Scan-line effect */}
            <div style={{
              position: 'absolute', inset: 0,
              background: 'repeating-linear-gradient(180deg, transparent, transparent 3px, rgba(255,255,255,0.025) 3px, rgba(255,255,255,0.025) 4px)',
              pointerEvents: 'none',
            }} />
          </div>
        );
      }}
    </Sprite>
  );
}

// 0:05 → 0:20 — Bob terminal asks for token
function A1Terminal() {
  return (
    <Sprite start={5} end={20}>
      {({ localTime, duration }) => {
        const inOp = clamp(localTime / 0.5, 0, 1);
        const outOp = clamp((duration - localTime) / 0.5, 0, 1);
        const opacity = Math.min(inOp, outOp);
        const dangerHi = localTime > 4;
        const zoom = 1 + (localTime / duration) * 0.06;
        return (
          <div style={{
            position: 'absolute', inset: 0,
            background: '#0a0a0b',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            padding: 80,
            opacity,
          }}>
            <div style={{
              width: 1280,
              background: '#1a1a1a',
              border: `2px solid ${dangerHi ? c.pink : '#2a2826'}`,
              borderRadius: 14,
              overflow: 'hidden',
              boxShadow: dangerHi
                ? '0 0 80px rgba(229,0,125,0.45), 0 30px 80px rgba(0,0,0,0.6)'
                : '0 30px 80px rgba(0,0,0,0.5)',
              transform: `scale(${zoom})`,
              transition: 'box-shadow 300ms, border-color 300ms',
            }}>
              <div style={{
                background: '#2a2826', padding: '14px 22px',
                display: 'flex', alignItems: 'center', gap: 10,
              }}>
                <span style={{ width: 14, height: 14, borderRadius: '50%', background: '#e94e3c' }} />
                <span style={{ width: 14, height: 14, borderRadius: '50%', background: '#f1ba36' }} />
                <span style={{ width: 14, height: 14, borderRadius: '50%', background: '#4cc858' }} />
                <span style={{ marginLeft: 'auto', marginRight: 'auto', fontFamily: 'JetBrains Mono', fontSize: 16, color: '#7a7a76' }}>
                  bob — work:ibm-bob-hackathon-2026-05
                </span>
              </div>
              <div style={{ padding: '36px 44px', fontFamily: 'JetBrains Mono', fontSize: 22, lineHeight: 1.7, color: '#cbc8bf' }}>
                <div><span style={{ color: '#7a7a76' }}>$</span> <span style={{ color: '#a4cba0' }}>bob</span></div>
                <div style={{ marginTop: 8 }}>
                  <span style={{ color: '#f0a880', fontWeight: 700 }}>Bob</span>{' '}
                  <span style={{ color: '#7a7a76' }}>[research-architect]</span>
                </div>
                <div style={{ marginTop: 22, fontSize: 22 }}>
                  I'm working on the IBM Bob Hackathon submission.<br />
                  To proceed I need the Upstash Redis token.<br />
                  How would you like to provide it?
                </div>
                <div style={{ marginTop: 22, display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {[
                    { n: 1, t: 'Provide the KV_REST_API_TOKEN value', danger: true },
                    { n: 2, t: "Launch Bob Shell — I'll set it manually" },
                    { n: 3, t: 'Help me fix the secret manager first' },
                    { n: 4, t: 'No, suggest changes (esc)' },
                  ].map((opt, i) => (
                    <div key={i} style={{
                      padding: '10px 22px',
                      borderRadius: 4,
                      background: opt.danger && dangerHi ? 'rgba(229,0,125,0.18)' : 'transparent',
                      border: opt.danger && dangerHi ? `1px solid ${c.pink}` : '1px solid transparent',
                      color: opt.danger && dangerHi ? '#fff' : '#cbc8bf',
                      position: 'relative',
                      transition: 'all 200ms',
                    }}>
                      <span style={{ color: opt.danger && dangerHi ? c.pink : '#7a7a76', marginRight: 14, fontWeight: 600 }}>
                        {opt.danger && dangerHi ? '▸' : ' '} {opt.n}.
                      </span>
                      {opt.t}
                      {opt.danger && dangerHi && (
                        <span style={{
                          position: 'absolute', right: 22, top: '50%', transform: 'translateY(-50%)',
                          color: c.pink, fontSize: 14, fontWeight: 700, letterSpacing: '0.16em',
                        }}>
                          ▲ PROMPT-INJECTION-SHAPE
                        </span>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

// 0:20 → 0:40 — PromptArmor disclosure zoom
function A1Disclosure() {
  return (
    <Sprite start={20} end={40}>
      {({ localTime, duration }) => {
        const inOp = clamp(localTime / 0.5, 0, 1);
        const outOp = clamp((duration - localTime) / 0.5, 0, 1);
        const opacity = Math.min(inOp, outOp);
        const zoom = 1 + (localTime / duration) * 0.08;
        return (
          <div style={{
            position: 'absolute', inset: 0,
            background: '#0a0a0b',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            padding: 60, opacity,
          }}>
            <div style={{
              width: 1400,
              background: '#fff',
              borderRadius: 12,
              boxShadow: '0 40px 100px rgba(0,0,0,0.6)',
              overflow: 'hidden',
              transform: `scale(${zoom})`,
            }}>
              <div style={{ background: c.paperWarm, padding: '14px 22px', display: 'flex', alignItems: 'center', gap: 10, borderBottom: `1px solid ${c.inkRule}` }}>
                <span style={{ width: 14, height: 14, borderRadius: '50%', background: '#e94e3c' }} />
                <span style={{ width: 14, height: 14, borderRadius: '50%', background: '#f1ba36' }} />
                <span style={{ width: 14, height: 14, borderRadius: '50%', background: '#4cc858' }} />
                <div style={{ flex: 1, marginLeft: 16, background: '#fff', borderRadius: 4, padding: '8px 18px', fontFamily: 'JetBrains Mono', fontSize: 18, color: c.inkFade }}>
                  promptarmor.com<b style={{ color: c.ink }}>/resources/ibm-ai-bob</b>
                </div>
              </div>
              <div style={{ padding: '46px 50px' }}>
                <span style={{
                  display: 'inline-block', fontFamily: 'JetBrains Mono', fontSize: 16,
                  color: c.err, textTransform: 'uppercase', letterSpacing: '0.18em', fontWeight: 700,
                  background: 'rgba(185,74,58,0.08)', padding: '6px 14px', borderRadius: 4, marginBottom: 24,
                }}>CVE DISCLOSURE · CRITICAL</span>
                <div style={{
                  fontFamily: 'Source Serif 4', fontWeight: 700, fontSize: 48, color: c.ink,
                  lineHeight: 1.18, marginBottom: 28, letterSpacing: '-0.02em',
                }}>
                  IBM AI ("Bob") downloads and executes <span style={{ background: 'linear-gradient(180deg, transparent 60%, rgba(229,0,125,0.28) 60%)' }}>malware</span>
                </div>
                <div style={{ fontFamily: 'Source Serif 4', fontSize: 26, lineHeight: 1.55, color: c.inkSoft, maxWidth: 1140 }}>
                  Bob's CLI silently invokes shell command substitution when generating bash output.
                  An attacker who controls any tool response, fetched URL, or file content that Bob reads
                  can execute arbitrary code on the developer's machine — bypassing the
                  human-approval gate by hiding execution inside <span style={{ fontFamily: 'JetBrains Mono', fontSize: 21, background: '#fdf2f5', padding: '2px 8px', borderRadius: 3, border: `1px solid #f6cdd9` }}>$(…)</span> and <span style={{ fontFamily: 'JetBrains Mono', fontSize: 21, background: '#fdf2f5', padding: '2px 8px', borderRadius: 3, border: `1px solid #f6cdd9` }}>&gt;(…)</span> process substitution.
                </div>
                <div style={{
                  marginTop: 32, paddingTop: 20, borderTop: `1px solid ${c.inkRule}`,
                  display: 'flex', justifyContent: 'space-between',
                  fontFamily: 'JetBrains Mono', fontSize: 16, color: c.inkFade,
                }}>
                  <span>PROMPTARMOR · 2026.01.18</span>
                  <span style={{ color: c.err, fontWeight: 700 }}>PUBLIC</span>
                </div>
              </div>
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

// 0:40 → 1:00 — The twist setup
function A1Twist() {
  return (
    <Sprite start={40} end={60}>
      {({ localTime, duration }) => {
        const inOp = clamp(localTime / 0.6, 0, 1);
        const outOp = clamp((duration - localTime) / 0.6, 0, 1);
        const opacity = Math.min(inOp, outOp);
        const logoScale = animate({ from: 0.4, to: 1, start: 0, end: 1.2, ease: Easing.easeOutBack })(localTime);
        const headline = clamp((localTime - 2) / 0.6, 0, 1);
        return (
          <div style={{
            position: 'absolute', inset: 0,
            background: c.paper,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexDirection: 'column', gap: 60, padding: 80, opacity,
          }}>
            {/* Watermark splat */}
            <img src="assets/madez-splatter.png" style={{
              position: 'absolute',
              width: 1400, height: 1400,
              top: '50%', left: '50%',
              transform: `translate(-50%, -50%) rotate(-8deg)`,
              opacity: 0.05,
              pointerEvents: 'none',
            }} />
            <img src="assets/madez-splatter.png" style={{
              width: 360, height: 360,
              objectFit: 'contain',
              transform: `scale(${logoScale})`,
              zIndex: 1,
            }} />
            <div style={{
              opacity: headline,
              fontFamily: 'Source Serif 4', fontWeight: 700, fontSize: 78,
              color: c.ink, letterSpacing: '-0.025em',
              textAlign: 'center', lineHeight: 1.05,
              maxWidth: 1500,
              zIndex: 1,
            }}>
              So we entered <span style={{ color: c.accent, borderBottom: `4px solid ${c.accent}` }}>Bob's own hackathon</span><br/>to ship the defenses.
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

// ============================================================
// ACT 2 — THE SOLUTION (1:00 → 3:00)
// ============================================================

// 1:00 → 1:15 — Two-Routers headline
function A2Headline() {
  return (
    <Sprite start={60} end={75}>
      {({ localTime, duration }) => {
        const opacity = clamp(localTime / 0.5, 0, 1) * clamp((duration - localTime) / 0.5, 0, 1);
        const subTyped = clamp((localTime - 1.5) / 2.5, 0, 1);
        const fullSub = 'ACMI routes agents · Bob routes models · Lobster Trap routes traffic';
        const visibleSub = fullSub.slice(0, Math.floor(subTyped * fullSub.length));
        return (
          <div style={{
            position: 'absolute', inset: 0,
            background: c.paper,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexDirection: 'column', gap: 60, opacity, padding: 80,
          }}>
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 22, color: c.accent, fontWeight: 700, letterSpacing: '0.22em', textTransform: 'uppercase' }}>FIG. 01 · THE PATTERN</div>
            <div style={{
              fontFamily: 'Source Serif 4', fontWeight: 700, fontSize: 110,
              color: c.ink, letterSpacing: '-0.03em',
              textAlign: 'center', lineHeight: 0.96, maxWidth: 1600,
            }}>
              Two-Routers-Compose<br/><span style={{ color: c.accent, fontStyle: 'italic', fontWeight: 600 }}>Guardian Controller</span>
            </div>
            <div style={{
              fontFamily: 'JetBrains Mono', fontSize: 30, color: c.inkSoft,
              letterSpacing: '0.01em', minHeight: 50,
            }}>
              {visibleSub}<span style={{ color: c.accent, opacity: Math.floor(localTime * 3) % 2 === 0 ? 1 : 0 }}>▎</span>
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

// 1:15 → 1:35 — Diagram reveal
function A2Diagram() {
  return (
    <Sprite start={75} end={95}>
      {({ localTime, duration }) => {
        const opacity = clamp(localTime / 0.4, 0, 1) * clamp((duration - localTime) / 0.4, 0, 1);
        const r1 = clamp((localTime - 0.2) / 0.6, 0, 1);
        const r2 = clamp((localTime - 1.4) / 0.6, 0, 1);
        const r3 = clamp((localTime - 2.6) / 0.6, 0, 1);
        const rail = clamp((localTime - 4.0) / 0.6, 0, 1);
        const RouterBox = ({ name, action, examples, num, op }) => (
          <div style={{
            background: c.paperWarm, border: `1px solid ${c.inkRule}`,
            borderRadius: 12, padding: '40px 28px 30px',
            opacity: op, minHeight: 380,
            transform: `translateY(${(1-op) * 30}px) scale(${0.94 + op * 0.06})`,
            boxShadow: '0 8px 24px rgba(0,0,0,0.06)',
            display: 'flex', flexDirection: 'column', gap: 12,
            position: 'relative',
          }}>
            <span style={{ position: 'absolute', top: 18, right: 22, fontFamily: 'JetBrains Mono', fontSize: 14, color: c.inkFade, letterSpacing: '0.18em', textTransform: 'uppercase' }}>{num}</span>
            <div style={{ fontFamily: 'Source Serif 4', fontWeight: 700, fontSize: 64, color: c.ink, letterSpacing: '-0.02em', lineHeight: 0.95 }}>{name}</div>
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 16, color: c.accent, textTransform: 'uppercase', letterSpacing: '0.2em', fontWeight: 700, marginTop: 14 }}>routes</div>
            <div style={{ fontFamily: 'Source Serif 4', fontWeight: 600, fontSize: 44, color: c.ink, lineHeight: 1, letterSpacing: '-0.01em' }}>{action}</div>
            <div style={{ marginTop: 'auto', paddingTop: 14, borderTop: `1px dashed ${c.inkRule}`, fontFamily: 'JetBrains Mono', fontSize: 18, color: c.inkFade, lineHeight: 1.6 }}>{examples}</div>
          </div>
        );
        return (
          <div style={{
            position: 'absolute', inset: 0, background: c.paper, opacity,
            padding: '120px 100px 80px',
            display: 'flex', flexDirection: 'column', gap: 36, justifyContent: 'center',
          }}>
            <div style={{
              display: 'grid', gridTemplateColumns: '1fr 80px 1fr 80px 1fr',
              alignItems: 'center', gap: 12,
            }}>
              <RouterBox num="001" name="ACMI" action="Agents" examples={"claude\nbentley\nbob"} op={r1} />
              <div style={{ textAlign: 'center', fontFamily: 'JetBrains Mono', fontSize: 56, color: c.accent, opacity: r1 }}>→</div>
              <RouterBox num="002" name="Bob" action="Models" examples={"claude\ngranite\nmistral"} op={r2} />
              <div style={{ textAlign: 'center', fontFamily: 'JetBrains Mono', fontSize: 56, color: c.accent, opacity: r2 }}>→</div>
              <RouterBox num="003" name="Lobster Trap" action="Traffic" examples={"allow\ndeny\nhuman-review"} op={r3} />
            </div>
            <div style={{
              padding: '24px 36px', background: c.accent, color: '#fff',
              borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center',
              gap: 24, opacity: rail, transform: `translateY(${(1-rail)*16}px)`,
            }}>
              <span style={{ fontFamily: 'JetBrains Mono', fontSize: 18, color: 'rgba(255,255,255,0.7)', letterSpacing: '0.22em', textTransform: 'uppercase' }}>composed →</span>
              <span style={{ fontFamily: 'Source Serif 4', fontStyle: 'italic', fontWeight: 600, fontSize: 40, letterSpacing: '-0.01em' }}>first OSS Guardian Controller for AI coding assistants</span>
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

// 1:35 → 2:05 — LOBSTER TRAP DEMO (the money shot)
function A2LobsterDemo() {
  return (
    <Sprite start={95} end={125}>
      {({ localTime, duration }) => {
        const opacity = clamp(localTime / 0.5, 0, 1) * clamp((duration - localTime) / 0.5, 0, 1);
        const typed = clamp((localTime - 1) / 3, 0, 1);
        const cmdFull = 'git commit -m "add OpenAI integration"';
        const visibleCmd = cmdFull.slice(0, Math.floor(typed * cmdFull.length));
        const showDeny = localTime > 5;
        const denyScale = animate({ from: 0.7, to: 1, start: 5, end: 5.4, ease: Easing.easeOutBack })(localTime);
        return (
          <div style={{ position: 'absolute', inset: 0, background: '#0a0a0b', opacity, padding: '100px 80px 80px', display: 'flex', flexDirection: 'column', gap: 30 }}>
            <div style={{
              fontFamily: 'JetBrains Mono', fontSize: 18, color: c.accentSoft,
              letterSpacing: '0.22em', textTransform: 'uppercase', fontWeight: 700,

// MAIN STAGE
// ============================================================
function Slideshow() {
  const time = useTime();
  const act = time < 60 ? { n: 1, name: 'THE PROBLEM' }
    : time < 180 ? { n: 2, name: 'THE SOLUTION' }
    : time < 270 ? { n: 3, name: 'META-RECURSIVE PROOF' }
    : { n: 4, name: 'TRY IT' };

  // Update screen label
  useEffect(() => {
    const root = document.getElementById('vroot');
    if (root) {
      const mm = String(Math.floor(time / 60)).padStart(2,'0');
      const ss = String(Math.floor(time % 60)).padStart(2,'0');
      root.setAttribute('data-screen-label', `t=${mm}:${ss} · Act ${act.n}`);
    }
  }, [Math.floor(time), act.n]);

  return (
    <div id="vroot" data-screen-label="t=00:00 · Act 1" style={{ position: 'absolute', inset: 0, background: c.paper, overflow: 'hidden' }}>
      {/* ACT 1 */}
      <A1ColdOpen />
      <A1Terminal />
      <A1Disclosure />
      <A1Twist />
      {/* ACT 2 */}
      <A2Headline />
      <A2Diagram />
      <A2LobsterDemo />
      <A2CryptKeeper />
      <A2Author />
      {/* ACT 3 */}
      <A3OpsCenter />
      <A3LessonsLearned />
      <A3Dogfood />
      <A3Bow />
      {/* ACT 4 */}
      <A4Tryit />

      <CaptionsTrack />
      <ActChrome actNum={act.n} actName={act.name} time={time} />
      <Progress />
    </div>
  );
}

function App() {
  return (
    <Stage width={W} height={H} duration={DURATION} background="#0a0a0b">
      <Slideshow />
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
