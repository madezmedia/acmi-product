<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ACMI Ops Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Paper */
    --paper: #faf9f5;
    --paper-elev: #f4f2eb;
    --paper-deep: #efece2;
    --divider: #ebe8de;
    /* Ink */
    --ink-1: #1a1a1a;
    --ink-2: #2c2c2a;
    --ink-3: #4a4a48;
    --ink-4: #7a7a76;
    --ink-5: #9a9a96;
    --border: #d4d2cc;
    /* Accent */
    --forest: #2d4a3e;
    --forest-2: #5a7d6f;
    --forest-deep: #1c3027;
    /* Archive */
    --archive: #b8b0a0;
    --archive-deep: #5c5648;
    /* Status */
    --ok: #4a7c59;
    --ok-bright: #22C55E;
    --warn: #b8862d;
    --warn-bright: #EAB308;
    --err: #b94a3a;
    --err-bright: #EF4444;
    /* Frameworks (warm recolor) */
    --fw-lg: #c2602e;     /* terracotta — LangGraph */
    --fw-cr: #b8862d;     /* ochre — CrewAI */
    --fw-ag: #6b6f3e;     /* olive — Agno / generic */
    --fw-ad: #8a4a4a;     /* clay — AutoGen / adk */
    /* Type */
    --serif: 'Source Serif 4', 'Iowan Old Style', Georgia, serif;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    /* Spacing scale */
    --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
    --s-5: 20px; --s-6: 24px; --s-7: 32px; --s-8: 40px;
    --s-9: 48px; --s-10: 64px;
    /* Radii */
    --r-xs: 2px; --r-sm: 3px; --r-md: 4px; --r-lg: 8px; --r-pill: 999px;
    /* Shadows */
    --sh-sm: 0 1px 2px rgba(26,26,26,.04);
    --sh-md: 0 2px 8px rgba(26,26,26,.06);
    --sh-lg: 0 8px 28px rgba(26,26,26,.08);
    /* Motion */
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-in: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--sans);
    color: var(--ink-2);
    background: var(--paper);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Density modifier */
  body[data-density="compact"]  { --dens: 0.85; }
  body[data-density="regular"]  { --dens: 1; }
  body[data-density="spacious"] { --dens: 1.15; }

  /* Type primitives */
  .meta {
    font-family: var(--sans);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-4);
  }
  .mono { font-family: var(--mono); font-size: 0.8125rem; }
  .serif { font-family: var(--serif); }

  h1, h2, h3, h4 { font-family: var(--serif); font-weight: 600; color: var(--ink-1); margin: 0; letter-spacing: -0.015em; }
  h1 { font-size: clamp(2.5rem, 5.6vw, 4.5rem); font-weight: 700; letter-spacing: -0.025em; line-height: 1.05; }
  h2 { font-size: clamp(1.75rem, 3vw, 2.4rem); }
  h3 { font-size: 1.25rem; }
  p  { margin: 0; }

  /* Selection */
  ::selection { background: rgba(45,74,62,.18); color: var(--forest-deep); }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--r-pill); border: 2px solid var(--paper); background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--archive); border: 2px solid var(--paper); background-clip: content-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* App shell */
  .app { min-height: 100vh; display: flex; flex-direction: column; }

  /* Top bar */
  .topbar {
    height: 56px;
    display: flex; align-items: center;
    padding: 0 var(--s-6);
    border-bottom: 1px solid var(--divider);
    background: var(--paper);
    position: sticky; top: 0; z-index: 30;
    gap: var(--s-5);
  }
  .brand {
    display: flex; align-items: baseline; gap: 10px;
    font-family: var(--serif); font-weight: 600; font-size: 18px; color: var(--ink-1);
    letter-spacing: -0.01em;
  }
  .brand .glyph {
    width: 18px; height: 18px; display: inline-block; border-radius: 2px;
    background:
      linear-gradient(135deg, var(--forest) 0 50%, var(--forest-2) 50% 100%);
    transform: translateY(2px);
    box-shadow: 0 0 0 1px var(--paper) inset, 0 0 0 1.5px var(--forest-deep);
  }
  .brand small { font-family: var(--sans); font-size: 11px; font-weight: 500; color: var(--ink-4); letter-spacing: 0.16em; text-transform: uppercase; }

  .topnav { display: flex; align-items: center; gap: 2px; margin-left: var(--s-5); }
  .topnav button {
    appearance: none; background: transparent; border: 0;
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    color: var(--ink-3);
    padding: 6px 10px; border-radius: var(--r-md);
    cursor: pointer;
    transition: background var(--ease) 180ms, color var(--ease) 180ms;
    letter-spacing: -0.005em;
  }
  .topnav button:hover { background: var(--paper-elev); color: var(--ink-1); }
  .topnav button[data-active="true"] {
    color: var(--forest-deep);
    background: rgba(45,74,62,.08);
  }

  .topbar-spacer { flex: 1; }

  .kbd {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-4);
    background: var(--paper-elev);
    border: 1px solid var(--divider);
    border-bottom-width: 2px;
    padding: 1px 5px; border-radius: 3px;
  }

  .cmd-btn {
    display: inline-flex; align-items: center; gap: 8px;
    height: 30px; padding: 0 10px;
    background: var(--paper-elev);
    border: 1px solid var(--divider);
    border-radius: var(--r-md);
    color: var(--ink-4);
    font-size: 12px;
    cursor: pointer;
    transition: all 180ms var(--ease);
  }
  .cmd-btn:hover { background: var(--paper-deep); border-color: var(--border); }

  /* Instance switcher */
  .instance-switch {
    position: relative;
    display: inline-flex; align-items: center; gap: 10px;
    height: 32px; padding: 0 12px 0 10px;
    background: var(--paper);
    border: 1px solid var(--forest);
    border-radius: var(--r-md);
    cursor: pointer;
    color: var(--ink-1);
    font-size: 13px;
    transition: all 180ms var(--ease);
  }
  .instance-switch:hover { background: rgba(45,74,62,.04); }
  .instance-switch .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok-bright); box-shadow: 0 0 0 3px rgba(34,197,94,.18); }
  .instance-switch .name { font-weight: 600; letter-spacing: -0.005em; }
  .instance-switch .count { font-family: var(--mono); font-size: 11px; color: var(--ink-4); }
  .instance-switch .chev { width: 14px; height: 14px; opacity: .55; }

  /* Generic dropdowns */
  .dropdown {
    position: absolute; top: calc(100% + 6px); right: 0;
    min-width: 320px;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--sh-lg);
    overflow: hidden;
    z-index: 50;
    animation: drop 220ms var(--ease);
  }
  @keyframes drop {
    from { opacity: 0; transform: translateY(-4px) scale(.98); }
    to   { opacity: 1; transform: translateY(0)     scale(1); }
  }
  .dropdown header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--divider);
    background: var(--paper-elev);
  }
  .dropdown ul { list-style: none; margin: 0; padding: 6px; }
  .dropdown li {
    display: grid;
    grid-template-columns: 10px 1fr auto;
    gap: 10px; align-items: center;
    padding: 8px 10px;
    border-radius: var(--r-md);
    cursor: pointer;
    transition: background 120ms var(--ease);
  }
  .dropdown li:hover { background: var(--paper-elev); }
  .dropdown li[data-current="true"] {
    background: rgba(45,74,62,.06);
    box-shadow: inset 2px 0 0 var(--forest);
  }
  .dropdown li .nm { font-size: 13px; font-weight: 500; color: var(--ink-1); }
  .dropdown li .sub { font-size: 11px; color: var(--ink-4); font-family: var(--mono); }
  .dropdown footer {
    padding: 8px;
    border-top: 1px solid var(--divider);
    background: var(--paper-elev);
  }
  .dropdown footer button {
    width: 100%;
    appearance: none; border: 1px dashed var(--border);
    background: transparent;
    border-radius: var(--r-md);
    padding: 8px; font-size: 12px; color: var(--ink-3);
    cursor: pointer;
    font-family: var(--sans);
  }
  .dropdown footer button:hover { border-color: var(--forest); color: var(--forest); }

  /* Status dot */
  .sd { display:inline-block; width:7px; height:7px; border-radius:50%; flex-shrink: 0; }
  .sd.ok   { background: var(--ok-bright); box-shadow: 0 0 0 2px rgba(34,197,94,.16); }
  .sd.warn { background: var(--warn-bright); box-shadow: 0 0 0 2px rgba(234,179,8,.18); }
  .sd.err  { background: var(--err-bright); box-shadow: 0 0 0 2px rgba(239,68,68,.18); }
  .sd.idle { background: var(--ink-5); }

  .pulse { position: relative; }
  .pulse::after {
    content:''; position:absolute; inset:-3px; border-radius:50%;
    border: 1.5px solid var(--ok-bright); opacity: 0;
    animation: pulse 2s var(--ease) infinite;
  }
  @keyframes pulse {
    0%   { opacity: .5; transform: scale(.6); }
    80%  { opacity: 0;  transform: scale(2.4); }
    100% { opacity: 0;  transform: scale(2.4); }
  }

  /* Buttons */
  .btn {
    appearance: none; border: 1px solid var(--border); background: var(--paper);
    border-radius: var(--r-md); padding: 6px 12px;
    font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--ink-2);
    cursor: pointer;
    transition: all 160ms var(--ease);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--paper-elev); border-color: var(--ink-4); }
  .btn.primary { background: var(--forest); border-color: var(--forest-deep); color: #faf9f5; }
  .btn.primary:hover { background: var(--forest-deep); color: var(--paper); }
  .btn.ok    { background: rgba(74,124,89,.10); border-color: rgba(74,124,89,.4); color: #2f5a3a; }
  .btn.ok:hover { background: rgba(74,124,89,.18); }
  .btn.warn  { background: rgba(184,134,45,.10); border-color: rgba(184,134,45,.4); color: #8a611c; }
  .btn.warn:hover { background: rgba(184,134,45,.18); }
  .btn.err   { background: rgba(185,74,58,.10); border-color: rgba(185,74,58,.4); color: #8a3325; }
  .btn.err:hover { background: rgba(185,74,58,.18); }
  .btn.ghost { border-color: transparent; background: transparent; color: var(--ink-3); }
  .btn.ghost:hover { background: var(--paper-elev); border-color: var(--divider); color: var(--ink-1); }

  /* Cards / panels */
  .panel {
    background: var(--paper);
    border: 1px solid var(--divider);
    border-radius: var(--r-md);
    display: flex; flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .panel-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--divider);
    background: var(--paper);
  }
  .panel-hd h4 {
    font-family: var(--sans);
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-3);
  }
  .panel-hd .hd-meta { font-family: var(--mono); font-size: 11px; color: var(--ink-4); }
  .panel-bd { padding: 12px 16px; overflow: auto; flex: 1; min-height: 0; }
  .panel-bd.flush { padding: 0; }

  /* Pills / tags */
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    height: 18px;
    padding: 0 7px;
    border-radius: var(--r-pill);
    font-family: var(--sans); font-size: 10px; font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: 1px solid transparent;
    line-height: 1;
    white-space: nowrap;
  }
  .pill.fw-lg { background: rgba(194,96,46,.10); color: #92481f; border-color: rgba(194,96,46,.25); }
  .pill.fw-cr { background: rgba(184,134,45,.10); color: #7a591f; border-color: rgba(184,134,45,.28); }
  .pill.fw-ag { background: rgba(107,111,62,.10); color: #4d5028; border-color: rgba(107,111,62,.30); }
  .pill.fw-ad { background: rgba(138,74,74,.10); color: #62302f; border-color: rgba(138,74,74,.28); }
  .pill.ghost { background: var(--paper-elev); color: var(--ink-3); border-color: var(--divider); }

  /* Editorial rule */
  .rule {
    height: 1px; background: var(--divider); margin: var(--s-5) 0;
    border: 0;
  }
  .rule.dotted { background: transparent; border-top: 1px dashed var(--border); }

  /* Loading shimmer */
  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }

  /* Toast */
  .toast-wrap {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 1000;
    display: flex; flex-direction: column; gap: 8px; align-items: center;
    pointer-events: none;
  }
  .toast {
    background: var(--ink-1); color: var(--paper);
    padding: 10px 16px; border-radius: var(--r-md);
    font-size: 13px; font-weight: 500;
    box-shadow: var(--sh-lg);
    display: flex; align-items: center; gap: 10px;
    animation: toast-in 320ms var(--ease);
  }
  .toast .swatch { width: 8px; height: 8px; border-radius: 50%; }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* HITL glow */
  @keyframes hitl-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(234,179,8,.5), 0 0 0 0 rgba(234,179,8,.0); }
    50%      { box-shadow: 0 0 0 4px rgba(234,179,8,.15), 0 0 18px rgba(234,179,8,.45); }
  }
  .hitl-glow { animation: hitl-glow 2.4s var(--ease) infinite; }

  /* Slide in panel */
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slide-down {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Edge fade */
  .fade-r { mask-image: linear-gradient(to right, black 90%, transparent 100%); }

  /* Utility */
  .row { display: flex; align-items: center; }
  .gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-5 { gap: 20px; } .gap-6 { gap: 24px; }
  .flex-1 { flex: 1; }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
